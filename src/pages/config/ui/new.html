<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Config — Enshrouded Server Config</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:title" content="New Config - Enshrouded Config Hub">
  <meta property="og:description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/favicon.svg">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/config-new.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header>
    <nav class="top-nav" id="top-nav" aria-label="Main navigation">
      <a href="/" class="nav-brand">Enshrouded Config</a>
      <div class="nav-actions" id="nav-actions">
        <a href="/login" class="btn btn-outline">Log In</a>
        <a href="/signup" class="btn btn-primary">Sign Up</a>
      </div>
    </nav>
  </header>

  <main id="main-content" class="page">
    <a class="back" href="/">&larr; Back</a>
    <h1>New Server Config</h1>

    <form id="create-form" data-telemetry-type="LEAD_FORM" data-telemetry-target="config.create">
      <div class="form-group">
        <label for="name">Config Name</label>
        <input type="text" id="name" name="name" required placeholder="e.g. My Enshrouded Server" autofocus>
      </div>

      <div class="form-group">
        <label for="preset">Game Settings Preset</label>
        <select id="preset" name="gameSettingsPreset" data-telemetry-type="FORM_INPUT" data-telemetry-target="config.preset-select">
          <option value="Default">Default</option>
          <option value="Relaxed">Relaxed</option>
          <option value="Hard">Hard</option>
          <option value="Survival">Survival</option>
          <option value="Custom">Custom</option>
        </select>
      </div>

      <button type="submit" class="btn-create" id="btn-submit" data-telemetry-type="CLICK" data-telemetry-target="config.create">Create Config</button>
      <p class="error" id="error" role="alert"></p>
    </form>
  </main>

    <footer class="site-footer">
    Built with <a href="https://github.com/valencets/valence">Valence</a> · <a href="https://github.com/forrestblade/enshrouded-server-config">Source on GitHub</a>
  </footer>

  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/config-new.js"></script>
  <script type="module" src="/js/telemetry-init.js"></script>
</body>
</html>
