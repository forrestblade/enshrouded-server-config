<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Profile — Enshrouded Server Config</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:title" content="User Profile - Enshrouded Config Hub">
  <meta property="og:description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/favicon.svg">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/browse.css">
  <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header>
    <nav class="top-nav" aria-label="Main navigation">
      <a href="/" class="nav-brand">Enshrouded Config</a>
      <div class="nav-actions" id="nav-actions">
        <a href="/login" class="btn btn-outline">Log In</a>
        <a href="/signup" class="btn btn-primary">Sign Up</a>
      </div>
    </nav>
  </header>
  <main id="main-content" class="profile-page">
    <a class="back" href="/browse">&larr; Browse</a>
    <div id="profile" hidden>
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar"></div>
        <div class="profile-info">
          <h1 id="profile-username"></h1>
          <p class="profile-bio" id="profile-bio"></p>
          <p class="profile-meta" id="profile-meta"></p>
        </div>
      </div>
      <div class="profile-stats" id="profile-stats"></div>
      <section class="profile-configs">
        <h2>Published Configs</h2>
        <div class="config-grid" id="profile-config-grid"></div>
        <p class="empty" id="profile-empty" hidden>No published configs yet.</p>
      </section>
    </div>
    <p class="not-found" id="not-found" hidden role="alert">User not found.</p>
  </main>
  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/profile.js"></script>
  <script type="module" src="/js/telemetry-init.js"></script>
</body>
</html>
