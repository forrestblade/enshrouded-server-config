<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browse Configs — Enshrouded Server Config</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:title" content="Browse Configs - Enshrouded Config Hub">
  <meta property="og:description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/favicon.svg">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/browse.css">
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="nav-brand">Enshrouded Config</a>
    <div class="nav-actions" id="nav-actions">
      <a href="/login" class="btn btn-outline">Log In</a>
      <a href="/signup" class="btn btn-primary">Sign Up</a>
    </div>
  </nav>
  <div class="browse-page">
    <div class="browse-header">
      <h1>Browse Configs</h1>
      <p>Community-shared server configurations for Enshrouded.</p>
    </div>
    <div class="browse-controls">
      <input type="search" id="search" placeholder="Search by name or preset..." class="search-input" data-telemetry-type="FORM_INPUT" data-telemetry-target="browse.search">
      <select id="filter-preset" class="filter-select" data-telemetry-type="FORM_INPUT" data-telemetry-target="browse.filter-preset">
        <option value="">All Presets</option>
        <option value="Default">Default</option>
        <option value="Relaxed">Relaxed</option>
        <option value="Hard">Hard</option>
        <option value="Survival">Survival</option>
        <option value="Custom">Custom</option>
      </select>
      <select id="sort-by" class="filter-select" data-telemetry-type="FORM_INPUT" data-telemetry-target="browse.sort">
        <option value="newest">Newest</option>
        <option value="most-liked">Most Liked</option>
        <option value="most-forked">Most Forked</option>
      </select>
    </div>
    <div class="tag-filters" id="tag-filters"></div>
    <section class="featured-section" id="featured-section" hidden>
      <h2>Featured</h2>
      <div class="config-grid" id="featured-list"></div>
    </section>
    <section class="all-section">
      <h2>All Shared Configs</h2>
      <div class="config-grid" id="config-grid"></div>
      <p class="empty" id="empty" hidden>No shared configs found.</p>
    </section>
  </div>
  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/browse.js"></script>
  <script type="module" src="/js/telemetry-init.js"></script>
</body>
</html>
