<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Config Detail — Enshrouded Server Config</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:title" content="Config Detail - Enshrouded Config Hub">
  <meta property="og:description" content="Build, share, and discover Enshrouded server configs. No JSON required.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/favicon.svg">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/browse.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <header>
    <nav class="top-nav" aria-label="Main navigation">
      <a href="/" class="nav-brand">Enshrouded Config</a>
      <div class="nav-actions" id="nav-actions">
        <a href="/login" class="btn btn-outline">Log In</a>
        <a href="/signup" class="btn btn-primary">Sign Up</a>
      </div>
    </nav>
  </header>
  <main id="main-content" class="detail-page">
    <a class="back" href="/browse">&larr; Browse</a>
    <div id="detail" hidden>
      <div class="detail-header">
        <div>
          <h1 id="config-name"></h1>
          <p class="detail-meta" id="config-meta"></p>
        </div>
        <div class="detail-actions">
          <button class="btn btn-outline" id="btn-export" data-telemetry-type="CLICK" data-telemetry-target="browse.export">Export JSON</button>
          <button class="btn btn-primary" id="btn-clone" hidden data-telemetry-type="CLICK" data-telemetry-target="browse.clone">Clone to My Configs</button>
        </div>
      </div>
      <div class="detail-section">
        <h2>Server Settings</h2>
        <div class="detail-grid" id="server-settings"></div>
      </div>
      <div class="detail-section">
        <h2>Game Settings</h2>
        <div class="detail-grid" id="game-settings"></div>
      </div>
      <div class="detail-section">
        <h2>User Groups</h2>
        <div id="user-groups"></div>
      </div>
    </div>
    <p class="not-found" id="not-found" hidden role="alert">Config not found or not shared.</p>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <footer class="site-footer">
    Built with <a href="https://github.com/valencets/valence">Valence</a> · <a href="https://github.com/forrestblade/enshrouded-server-config">Source on GitHub</a>
  </footer>

  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/browse-detail.js"></script>
  <script type="module" src="/js/telemetry-init.js"></script>
</body>
</html>
